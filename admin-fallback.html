<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>AeroMusic Server Connection Failure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #07070a;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      margin: 0;
    }
    
    .card {
      background: rgba(15, 15, 21, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 25px rgba(239, 68, 68, 0.15);
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      text-align: center;
    }
    
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: inline-block;
      animation: pulse 2s infinite alternate;
    }
    
    @keyframes pulse {
      from { transform: scale(1); filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.2)); }
      to { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5)); }
    }
    
    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    
    p {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .form-group {
      text-align: left;
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      color: #6b7280;
      margin-bottom: 8px;
      font-family: 'Outfit', sans-serif;
    }
    
    input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }
    
    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    
    button {
      width: 100%;
      background: #8b5cf6;
      color: #000;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }
    
    button:hover {
      background: #a78bfa;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(139, 92, 246, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">⚠️</div>
    <h2>Server Connection Offline</h2>
    <p>Could not connect to the AeroMusic database server. Make sure the main AeroMusic player is running on your system to launch the backend.</p>
    
    <div class="form-group">
      <label for="server-address">Server Address</label>
      <input type="text" id="server-address" value="http://localhost:3000" placeholder="http://[IP_OR_HOSTNAME]:3000">
    </div>
    
    <button onclick="retryConnection()">Retry Connection</button>
  </div>

  <script>
    // Read previously saved custom address if any
    const savedAddress = localStorage.getItem("aero-admin-server-address");
    if (savedAddress) {
      document.getElementById("server-address").value = savedAddress;
    }

    function retryConnection() {
      if (window.adminAPI && window.adminAPI.retry) {
        window.adminAPI.retry();
      } else {
        const address = document.getElementById("server-address").value.trim();
        if (!address) return;
        
        // Save address
        localStorage.setItem("aero-admin-server-address", address);
        
        // Attempt connection to the admin portal
        window.location.href = address.endsWith("/") 
          ? address + "admin.html" 
          : address + "/admin.html";
      }
    }
  </script>

</body>
</html>
